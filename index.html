<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tủ Truyện Của Tôi — Quản lý bộ sưu tập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1714;
        --paper: #f7f3ec;
        --card: #ffffff;
        --red: #e5342a;
        --muted: #8a8276;
        --maxw: 1180px;
        --r: 4px;
        --shadow-hard: 5px 5px 0 var(--ink);
        --shadow-hard-lg: 8px 8px 0 var(--ink);
        --halftone: radial-gradient(
          circle,
          rgba(26, 23, 20, 0.16) 1.1px,
          transparent 1.5px
        );
        --halftone-red: radial-gradient(
          circle,
          rgba(229, 52, 42, 0.45) 1.1px,
          transparent 1.5px
        );
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Be Vietnam Pro", system-ui, -apple-system, "Segoe UI",
          Roboto, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      input,
      select,
      textarea {
        font-family: inherit;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 60;
        background: var(--paper);
        border-bottom: 3px solid var(--ink);
      }
      .header-inner {
        max-width: var(--maxw);
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 14px 20px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 11px;
        flex-shrink: 0;
      }
      .logo-mark {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
        background: var(--red);
        border: 2.5px solid var(--ink);
        border-radius: 50% 50% 50% 4px;
        display: grid;
        place-items: center;
        box-shadow: 3px 3px 0 var(--ink);
      }
      .logo-mark svg {
        width: 22px;
        height: 22px;
        stroke: #fff;
        stroke-width: 2;
        fill: none;
      }
      .logo-text {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        line-height: 1;
      }
      .logo-text small {
        display: block;
        font-size: 10px;
        letter-spacing: 2.5px;
        color: var(--muted);
        font-weight: 500;
      }
      .header-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .btn {
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        padding: 11px 18px;
        border: 2.5px solid var(--ink);
        border-radius: var(--r);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.15s;
        box-shadow: var(--shadow-hard);
        white-space: nowrap;
      }
      .btn:hover {
        transform: translate(-2px, -2px);
        box-shadow: var(--shadow-hard-lg);
      }
      .btn:active {
        transform: translate(0, 0);
        box-shadow: 2px 2px 0 var(--ink);
      }
      .btn--red {
        background: var(--red);
        color: #fff;
      }
      .btn--paper {
        background: var(--card);
        color: var(--ink);
      }
      .btn--ink {
        background: var(--ink);
        color: var(--paper);
      }
      .btn svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        stroke-width: 2.2;
        fill: none;
      }
      .btn.sm {
        font-size: 12.5px;
        padding: 9px 13px;
        box-shadow: 3px 3px 0 var(--ink);
      }
      .btn.sm:hover {
        box-shadow: 4px 4px 0 var(--ink);
      }
      .btn.ghost {
        box-shadow: none;
        border-width: 2px;
      }
      .btn.ghost:hover {
        transform: none;
        background: #efe9df;
        box-shadow: none;
      }

      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 30px 20px 70px;
      }
      .page-head {
        margin-bottom: 22px;
      }
      .page-head h1 {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: clamp(28px, 5vw, 44px);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        line-height: 1;
      }
      .page-head p {
        color: var(--muted);
        font-size: 15px;
        margin-top: 6px;
      }
      .page-head p b {
        color: var(--red);
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 13px;
        margin-bottom: 28px;
      }
      .stat {
        flex: 1;
        min-width: 140px;
        background: var(--card);
        border: 2.5px solid var(--ink);
        border-radius: var(--r);
        box-shadow: var(--shadow-hard);
        padding: 15px 17px;
      }
      .stat .num {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 30px;
        line-height: 1;
      }
      .stat .lbl {
        font-family: "Oswald", sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        font-weight: 500;
        margin-top: 5px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .stat.accent {
        background: var(--red);
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .stat.accent::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone-red);
        background-size: 8px 8px;
        opacity: 0.5;
      }
      .stat.accent .lbl {
        color: rgba(255, 255, 255, 0.85);
      }
      .stat.dark {
        background: var(--ink);
        color: var(--paper);
        position: relative;
        overflow: hidden;
      }
      .stat.dark::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone-red);
        background-size: 8px 8px;
        opacity: 0.45;
      }
      .stat.dark .num,
      .stat.dark .lbl {
        position: relative;
        z-index: 2;
      }
      .stat.dark .lbl {
        color: rgba(247, 243, 236, 0.7);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 11px;
        margin-bottom: 14px;
        padding-bottom: 18px;
        border-bottom: 2px solid var(--ink);
      }
      .chips {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .chips::-webkit-scrollbar {
        display: none;
      }
      .chip {
        flex-shrink: 0;
        font-family: "Oswald", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 8px 15px;
        border: 2px solid var(--ink);
        border-radius: 30px;
        background: var(--card);
        transition: 0.15s;
        white-space: nowrap;
      }
      .chip:hover {
        background: #efe9df;
      }
      .chip.active {
        background: var(--ink);
        color: var(--paper);
      }
      .chip .n {
        opacity: 0.6;
        font-size: 11px;
        margin-left: 4px;
      }
      .spacer {
        flex: 1;
        min-width: 8px;
      }
      .ctl {
        display: flex;
        align-items: center;
        gap: 7px;
        border: 2px solid var(--ink);
        border-radius: 30px;
        padding: 6px 13px;
        background: var(--card);
      }
      .ctl svg {
        width: 16px;
        height: 16px;
        stroke: var(--muted);
        stroke-width: 2;
        fill: none;
        flex-shrink: 0;
      }
      .ctl input,
      .ctl select {
        border: none;
        outline: none;
        background: none;
        font-size: 13.5px;
        color: var(--ink);
      }
      .ctl input {
        width: 150px;
      }
      .ctl input::placeholder {
        color: var(--muted);
      }
      .ctl select {
        font-family: "Oswald", sans-serif;
        font-weight: 500;
        letter-spacing: 0.3px;
        cursor: pointer;
      }

      .subchips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 24px;
      }
      .subchips .lead {
        font-family: "Oswald", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--muted);
        align-self: center;
        margin-right: 2px;
      }
      .subchip {
        flex-shrink: 0;
        font-family: "Oswald", sans-serif;
        font-size: 12.5px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        padding: 6px 14px;
        border: 2px solid var(--ink);
        border-radius: 30px;
        background: var(--card);
        transition: 0.13s;
      }
      .subchip:hover {
        background: #efe9df;
      }
      .subchip.active {
        background: var(--red);
        color: #fff;
      }
      .subchip .n {
        opacity: 0.65;
        font-size: 11px;
        margin-left: 3px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(186px, 1fr));
        gap: 26px 22px;
      }
      .card {
        background: var(--card);
        border: 2.5px solid var(--ink);
        border-radius: var(--r);
        box-shadow: var(--shadow-hard);
        display: flex;
        flex-direction: column;
        transition: transform 0.18s, box-shadow 0.18s;
        overflow: hidden;
        cursor: pointer;
      }
      .card:hover {
        transform: translate(-3px, -3px);
        box-shadow: var(--shadow-hard-lg);
      }
      .cover {
        aspect-ratio: 3/4.1;
        position: relative;
        overflow: hidden;
        border-bottom: 2.5px solid var(--ink);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 14px;
      }
      .cover img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .cover--red {
        background: var(--red);
      }
      .cover--ink {
        background: var(--ink);
      }
      .cover--paper {
        background: #efe6d4;
      }
      .cover::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone);
        background-size: 8px 8px;
        opacity: 0.5;
        pointer-events: none;
      }
      .cover--paper::before {
        opacity: 0.7;
      }
      .cover-title {
        position: relative;
        z-index: 2;
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        line-height: 1.02;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        font-size: clamp(17px, 2vw, 21px);
      }
      .cover--red .cover-title,
      .cover--ink .cover-title {
        color: var(--paper);
      }
      .cover--paper .cover-title {
        color: var(--ink);
      }
      .cover-sub {
        position: relative;
        z-index: 2;
        font-size: 11px;
        margin-top: 5px;
        opacity: 0.8;
        font-weight: 500;
      }
      .cover--red .cover-sub,
      .cover--ink .cover-sub {
        color: var(--paper);
      }
      .cover--paper .cover-sub {
        color: #5a544a;
      }
      .cover-tag {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 3;
        background: var(--ink);
        color: var(--paper);
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        padding: 5px 10px;
        border-right: 2.5px solid var(--ink);
        border-bottom: 2.5px solid var(--ink);
        border-radius: 0 0 var(--r) 0;
      }
      .cover--ink .cover-tag {
        background: var(--red);
      }
      .card-tools {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 4;
        display: flex;
        gap: 6px;
        opacity: 0;
        transition: 0.15s;
      }
      .card:hover .card-tools {
        opacity: 1;
      }
      .tool-btn {
        width: 30px;
        height: 30px;
        border: 2px solid var(--ink);
        border-radius: 5px;
        background: var(--paper);
        display: grid;
        place-items: center;
      }
      .tool-btn svg {
        width: 14px;
        height: 14px;
        stroke: var(--ink);
        stroke-width: 2;
        fill: none;
      }
      .tool-btn.del:hover {
        background: var(--red);
      }
      .tool-btn.del:hover svg {
        stroke: #fff;
      }
      .card-body {
        padding: 13px 14px 15px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .card-title {
        font-weight: 700;
        font-size: 15px;
        line-height: 1.25;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-author {
        font-size: 12.5px;
        color: var(--muted);
        margin-top: 3px;
      }
      .stars {
        font-size: 13px;
        letter-spacing: 1px;
        color: var(--red);
        margin-top: 7px;
        min-height: 18px;
      }
      .stars .off {
        color: #d8d0c2;
      }
      .badges {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .tag {
        font-family: "Oswald", sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        padding: 3px 8px;
        border: 1.5px solid var(--ink);
        border-radius: 20px;
      }
      .tag.cat {
        background: var(--ink);
        color: var(--paper);
      }
      .tag.read {
        background: #1f7a3d;
        color: #fff;
        border-color: var(--ink);
      }
      .tag.reading {
        background: var(--red);
        color: #fff;
        border-color: var(--ink);
      }
      .tag.unread {
        background: transparent;
        color: var(--muted);
        border-color: #c9c2b6;
      }
      .tag.sp {
        background: transparent;
        color: var(--red);
        border-color: var(--red);
      }
      .tag.fold {
        background: #efe6d4;
        color: var(--ink);
        border-color: var(--ink);
      }
      .card-foot {
        margin-top: auto;
        padding-top: 11px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .price {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 15px;
      }
      .card-date {
        font-size: 11px;
        color: var(--muted);
      }

      .section-label {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 4px 0 16px;
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 2px;
        background: var(--ink);
      }
      .section-label:not(:first-child) {
        margin-top: 34px;
      }
      .sl-count {
        font-family: "Be Vietnam Pro", sans-serif;
        font-weight: 400;
        font-size: 13px;
        color: var(--muted);
        text-transform: none;
        letter-spacing: 0;
      }

      .empty {
        text-align: center;
        padding: 70px 20px;
        color: var(--muted);
      }
      .empty svg {
        width: 58px;
        height: 58px;
        stroke: var(--muted);
        stroke-width: 1.5;
        fill: none;
        margin-bottom: 16px;
      }
      .empty .btn {
        margin-top: 18px;
      }

      .fab {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 55;
        width: 60px;
        height: 60px;
        background: var(--red);
        border: 3px solid var(--ink);
        border-radius: 50% 50% 50% 6px;
        box-shadow: var(--shadow-hard);
        display: grid;
        place-items: center;
        transition: transform 0.16s;
      }
      .fab:hover {
        transform: translate(-2px, -2px) rotate(-4deg);
      }
      .fab svg {
        width: 28px;
        height: 28px;
        stroke: #fff;
        stroke-width: 2.4;
        fill: none;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 23, 20, 0.6);
        z-index: 90;
        display: grid;
        place-items: center;
        padding: 18px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.22s;
      }
      .overlay.open {
        opacity: 1;
        visibility: visible;
      }
      .editor {
        background: var(--paper);
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: var(--shadow-hard-lg);
        width: 100%;
        max-width: 560px;
        max-height: 92vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transform: scale(0.96);
        transition: transform 0.24s cubic-bezier(0.34, 1.3, 0.64, 1);
      }
      .overlay.open .editor {
        transform: scale(1);
      }
      .editor-head {
        background: var(--ink);
        color: var(--paper);
        padding: 15px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .editor-head::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone-red);
        background-size: 9px 9px;
        opacity: 0.5;
        pointer-events: none;
      }
      .editor-head h2 {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .x-btn {
        width: 32px;
        height: 32px;
        border: 2px solid var(--paper);
        border-radius: 5px;
        display: grid;
        place-items: center;
        position: relative;
        z-index: 2;
      }
      .x-btn svg {
        width: 15px;
        height: 15px;
        stroke: var(--paper);
        stroke-width: 2.5;
        fill: none;
      }
      .x-btn:hover {
        background: var(--red);
      }
      .editor-body {
        padding: 22px;
        overflow-y: auto;
      }
      .fld {
        margin-bottom: 13px;
      }
      .fld label {
        display: block;
        font-family: "Oswald", sans-serif;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .fld label .req {
        color: var(--red);
      }
      .fld input,
      .fld select,
      .fld textarea {
        width: 100%;
        border: 2px solid var(--ink);
        border-radius: 4px;
        padding: 10px 12px;
        font-size: 14px;
        background: var(--card);
        color: var(--ink);
        outline: none;
      }
      .fld input:focus,
      .fld select:focus,
      .fld textarea:focus {
        box-shadow: 2px 2px 0 var(--red);
      }
      .fld textarea {
        resize: vertical;
        min-height: 64px;
      }
      .fld-row {
        display: flex;
        gap: 11px;
      }
      .fld-row .fld {
        flex: 1;
      }
      .total-preview {
        font-size: 13.5px;
        color: var(--ink);
        background: #fdf6df;
        border: 1.5px solid #e8d8a0;
        border-radius: 4px;
        padding: 9px 12px;
        margin: -3px 0 13px;
      }
      .total-preview:empty {
        display: none;
      }
      .total-preview b {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: var(--red);
      }
      .total-preview .tp-sub {
        color: var(--muted);
        font-size: 12px;
      }
      .star-input {
        display: flex;
        gap: 4px;
      }
      .star-input span {
        font-size: 26px;
        color: #d8d0c2;
        cursor: pointer;
        line-height: 1;
        transition: 0.1s;
      }
      .star-input span.on {
        color: var(--red);
      }
      .star-input span:hover {
        transform: scale(1.15);
      }
      .cover-pick {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .cover-prev {
        width: 66px;
        height: 86px;
        border: 2px solid var(--ink);
        border-radius: 3px;
        overflow: hidden;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        font-family: "Oswald", sans-serif;
        font-size: 9px;
        text-align: center;
        padding: 4px;
        line-height: 1.1;
        position: relative;
      }
      .cover-prev img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .cover-pick .stack {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .file-btn {
        border: 2px dashed var(--ink);
        border-radius: 4px;
        padding: 9px;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        background: var(--card);
        cursor: pointer;
        transition: 0.13s;
      }
      .file-btn:hover {
        background: #efe9df;
      }
      .special-list {
        display: flex;
        flex-direction: column;
        gap: 9px;
        margin-bottom: 9px;
      }
      .special-item {
        display: flex;
        gap: 10px;
        border: 2px solid var(--ink);
        border-radius: 5px;
        padding: 8px;
        background: var(--card);
      }
      .sp-thumb {
        width: 48px;
        height: 62px;
        flex-shrink: 0;
        border: 2px solid var(--ink);
        border-radius: 3px;
        overflow: hidden;
        display: grid;
        place-items: center;
        cursor: pointer;
        position: relative;
        background: #efe6d4;
        transition: 0.12s;
      }
      .sp-thumb:hover {
        box-shadow: 2px 2px 0 var(--ink);
      }
      .sp-thumb img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .sp-thumb-add {
        font-family: "Oswald", sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.4px;
        color: var(--muted);
        text-transform: uppercase;
        text-align: center;
        padding: 2px;
      }
      .sp-fields {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 7px;
        min-width: 0;
      }
      .sp-fields input {
        width: 100%;
        border: 2px solid var(--ink);
        border-radius: 4px;
        padding: 9px 11px;
        font-size: 14px;
        background: var(--card);
        color: var(--ink);
        outline: none;
      }
      .sp-fields input:focus {
        box-shadow: 2px 2px 0 var(--red);
      }
      .sp-row2 {
        display: flex;
        gap: 7px;
      }
      .sp-row2 .sp-vol {
        width: 84px;
        flex-shrink: 0;
      }
      .sp-row2 .sp-price {
        flex: 1;
      }
      .sp-del {
        width: 42px;
        flex-shrink: 0;
        border: 2px solid var(--ink);
        border-radius: 4px;
        background: var(--paper);
        font-family: "Oswald", sans-serif;
        font-size: 20px;
        line-height: 1;
        color: var(--ink);
        transition: 0.12s;
      }
      .sp-del:hover {
        background: var(--red);
        color: #fff;
      }
      .add-special {
        width: 100%;
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border: 2px dashed var(--ink);
        border-radius: 4px;
        padding: 9px 14px;
        background: var(--card);
        transition: 0.13s;
      }
      .add-special:hover {
        background: #efe9df;
      }
      .editor-foot {
        border-top: 3px solid var(--ink);
        padding: 14px 22px;
        background: var(--card);
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }
      .del-link {
        font-size: 13px;
        color: var(--muted);
        text-decoration: underline;
        background: none;
        padding: 6px;
      }
      .del-link:hover {
        color: var(--red);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%) translateY(80px);
        background: var(--ink);
        color: var(--paper);
        padding: 13px 22px;
        border-radius: 6px;
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        letter-spacing: 0.5px;
        font-size: 14px;
        z-index: 120;
        box-shadow: var(--shadow-hard);
        opacity: 0;
        transition: 0.3s;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 9px;
        text-transform: uppercase;
      }
      .toast svg {
        width: 18px;
        height: 18px;
        stroke: var(--red);
        stroke-width: 2.5;
        fill: none;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 600px) {
        .header-inner {
          gap: 11px;
          padding: 12px 15px;
        }
        .logo-text {
          font-size: 18px;
        }
        .header-actions .btn span.hide-sm {
          display: none;
        }
        .header-actions .btn.sm {
          padding: 9px 11px;
        }
        .wrap {
          padding: 24px 15px 80px;
        }
        .stat {
          min-width: calc(50% - 7px);
        }
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 18px 14px;
        }
        .ctl input {
          width: 110px;
        }
        .fab {
          right: 16px;
          bottom: 16px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-mark"
            ><svg viewBox="0 0 24 24">
              <path d="M4 19.5V5a2 2 0 0 1 2-2h12v18l-6-3-6 3z" />
              <path d="M9 8h6M9 11h6" /></svg
          ></span>
          <span class="logo-text"
            >Tủ Truyện Của Tôi<small>Bộ sưu tập cá nhân</small></span
          >
        </div>
        <div class="header-actions">
          <button
            class="btn btn--paper sm ghost"
            onclick="exportJSON()"
            title="Sao lưu ra file"
          >
            <svg viewBox="0 0 24 24">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" /></svg
            ><span class="hide-sm">Sao lưu</span>
          </button>
          <label
            class="btn btn--paper sm ghost"
            for="importFile"
            style="cursor: pointer"
            title="Khôi phục từ file"
            ><svg viewBox="0 0 24 24">
              <path d="M12 21V9m0 0l-4 4m4-4l4 4M5 3h14" /></svg
            ><span class="hide-sm">Khôi phục</span></label
          >
          <input
            type="file"
            id="importFile"
            accept=".json,application/json"
            style="display: none"
          />
          <button class="btn btn--red sm" onclick="openEditor()">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>Thêm
            truyện
          </button>
        </div>
      </div>
    </header>

    <div class="wrap">
      <div class="page-head">
        <h1>Bộ sưu tập của tôi</h1>
        <p id="subline"></p>
      </div>

      <div class="stats" id="stats"></div>

      <div class="toolbar">
        <div class="chips" id="chips">
          <button class="chip active" data-cat="all">
            Tất cả <span class="n" data-c="all"></span>
          </button>
          <button class="chip" data-cat="full">
            Truyện Full <span class="n" data-c="full"></span>
          </button>
          <button class="chip" data-cat="le">
            Truyện Lẻ <span class="n" data-c="le"></span>
          </button>
          <button class="chip" data-cat="boxset">
            Boxset <span class="n" data-c="boxset"></span>
          </button>
          <button class="chip" data-cat="related">
            Truyện liên quan <span class="n" data-c="related"></span>
          </button>
        </div>
        <div class="spacer"></div>
        <div class="ctl">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input type="text" id="search" placeholder="Tìm tên / tác giả…" />
        </div>
        <div class="ctl">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M7 12h10M10 18h4" /></svg>
          <select id="readFilter">
            <option value="all">Tất cả</option>
            <option value="unread">Chưa đọc</option>
            <option value="reading">Đang đọc</option>
            <option value="read">Đã đọc</option>
          </select>
        </div>
        <div class="ctl">
          <svg viewBox="0 0 24 24">
            <path d="M3 7h13M3 12h9M3 17h5M17 7v10m0 0l3-3m-3 3l-3-3" />
          </svg>
          <select id="sort">
            <option value="new">Mới thêm</option>
            <option value="old">Cũ nhất</option>
            <option value="az">Tên A→Z</option>
            <option value="priceHigh">Giá cao→thấp</option>
            <option value="priceLow">Giá thấp→cao</option>
          </select>
        </div>
      </div>

      <div class="subchips" id="subchips" style="display: none"></div>

      <div id="content"></div>
    </div>

    <button class="fab" onclick="openEditor()" aria-label="Thêm truyện">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
    </button>

    <!-- EDITOR -->
    <div class="overlay" id="overlay">
      <div class="editor">
        <div class="editor-head">
          <h2 id="editorTitle">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 5v14M5 12h14" /></svg
            >Thêm truyện
          </h2>
          <button class="x-btn" onclick="closeEditor()" aria-label="Đóng">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" /></svg>
          </button>
        </div>
        <div class="editor-body">
          <input type="hidden" id="f_id" />
          <div class="fld">
            <label>Tên truyện <span class="req">*</span></label
            ><input
              type="text"
              id="f_title"
              placeholder="VD: One Piece — Tập 105"
            />
          </div>
          <div class="fld-row">
            <div class="fld">
              <label>Tác giả</label
              ><input type="text" id="f_author" placeholder="Eiichiro Oda" />
            </div>
            <div class="fld">
              <label>NXB</label
              ><input type="text" id="f_publisher" placeholder="NXB Trẻ" />
            </div>
          </div>
          <div class="fld-row">
            <div class="fld">
              <label>Danh mục <span class="req">*</span></label
              ><select id="f_category">
                <option value="full">Truyện Full</option>
                <option value="le">Truyện Lẻ</option>
                <option value="boxset">Boxset</option>
              </select>
            </div>
            <div class="fld">
              <label>Số tập (mô tả)</label
              ><input
                type="text"
                id="f_volumes"
                placeholder="Trọn bộ / Tập 1–18 / Boxset…"
              />
            </div>
          </div>
          <div class="fld">
            <label>Truyện liên quan (nhóm chung — vd: Doraemon)</label
            ><input
              type="text"
              id="f_folder"
              list="folderList"
              placeholder="Để trống nếu không thuộc nhóm nào"
            /><datalist id="folderList"></datalist>
          </div>
          <div class="fld-row">
            <div class="fld">
              <label>Giá mua / cuốn (đồng)</label
              ><input
                type="number"
                id="f_price"
                placeholder="32000"
                min="0"
                oninput="updateTotalPreview()"
              />
            </div>
            <div class="fld">
              <label>Số cuốn</label
              ><input
                type="number"
                id="f_qty"
                placeholder="1"
                min="1"
                value="1"
                oninput="updateTotalPreview()"
              />
            </div>
          </div>
          <div class="total-preview" id="totalPreview"></div>
          <div class="fld">
            <label>Bản đặc biệt (nếu có)</label>
            <div class="special-list" id="specialList"></div>
            <button type="button" class="add-special" onclick="addSpecial()">
              + Thêm bản đặc biệt
            </button>
          </div>
          <div class="fld-row">
            <div class="fld">
              <label>Tình trạng đọc</label
              ><select id="f_read">
                <option value="unread">Chưa đọc</option>
                <option value="reading">Đang đọc</option>
                <option value="read">Đã đọc</option>
              </select>
            </div>
            <div class="fld">
              <label>Tình trạng sách</label
              ><input
                type="text"
                id="f_condition"
                placeholder="Mới / Như mới…"
              />
            </div>
          </div>
          <div class="fld">
            <label>Đánh giá</label>
            <div class="star-input" id="starInput"></div>
          </div>
          <div class="fld">
            <label>Ảnh bìa</label>
            <div class="cover-pick">
              <div class="cover-prev" id="coverPrev"></div>
              <div class="stack">
                <label class="file-btn" for="f_file">📷 Tải ảnh từ máy</label>
                <input
                  type="file"
                  id="f_file"
                  accept="image/*"
                  style="display: none"
                />
                <input
                  type="text"
                  id="f_cover"
                  placeholder="hoặc dán link ảnh https://…"
                  oninput="updateCoverPrev()"
                />
                <select id="f_coverStyle" onchange="updateCoverPrev()">
                  <option value="red">Bìa đỏ (khi chưa có ảnh)</option>
                  <option value="ink">Bìa mực</option>
                  <option value="paper">Bìa giấy</option>
                </select>
              </div>
            </div>
          </div>
          <div class="fld">
            <label>Ghi chú</label
            ><textarea id="f_note" placeholder="Ghi chú riêng…"></textarea>
          </div>
        </div>
        <div class="editor-foot">
          <button
            class="del-link"
            id="delLink"
            onclick="deleteCurrent()"
            style="display: none"
          >
            Xoá truyện
          </button>
          <div style="flex: 1"></div>
          <button
            class="btn btn--red"
            onclick="saveItem()"
            style="flex: 0 0 auto; min-width: 140px"
          >
            <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" /></svg
            ><span id="saveLbl">Lưu truyện</span>
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" /></svg
      ><span id="toastText"></span>
    </div>

    <script>
      const LS_KEY = "tutruyen_canhan_v1";
      const CAT_BADGE = { full: "Trọn bộ", le: "Tập lẻ", boxset: "Boxset" };
      const READ_LABEL = {
        unread: "Chưa đọc",
        reading: "Đang đọc",
        read: "Đã đọc",
      };

      let items = [],
        editingId = null,
        formCover = "",
        formRating = 0,
        formSpecials = [];
      const state = {
        cat: "all",
        group: "all",
        read: "all",
        q: "",
        sort: "new",
      };

      const $ = (s) => document.querySelector(s);
      const money = (n) => Number(n).toLocaleString("vi-VN") + "₫";
      const specialTotal = (arr) =>
        (arr || []).reduce((s, x) => s + (Number(x.price) || 0), 0);
      const itemTotal = (c) =>
        (Number(c.price) || 0) * Math.max(1, Number(c.qty) || 1) +
        specialTotal(c.specials);
      const esc = (s) =>
        String(s == null ? "" : s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])
        );
      const shortTitle = (t) => String(t).split("—")[0].trim();
      const grp = (c) => (c.folder || "").trim();
      function todayStr() {
        const t = new Date(),
          p = (n) => String(n).padStart(2, "0");
        return `${t.getFullYear()}-${p(t.getMonth() + 1)}-${p(t.getDate())}`;
      }

      function readLocal() {
        try {
          const r = localStorage.getItem(LS_KEY);
          const a = r ? JSON.parse(r) : null;
          return Array.isArray(a) ? a : null;
        } catch (e) {
          return null;
        }
      }
      function save() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(items));
        } catch (e) {}
      }
      function readSeed() {
        try {
          return JSON.parse($("#seedData").textContent) || [];
        } catch (e) {
          return [];
        }
      }

      function coverHTML(c) {
        if (c.cover) return `<img src="${esc(c.cover)}" alt="">`;
        return `<span class="cover-tag">${
          CAT_BADGE[c.category] || ""
        }</span><span class="cover-title">${esc(
          shortTitle(c.title)
        )}</span><span class="cover-sub">${esc(c.author)}</span>`;
      }
      function starsHTML(r) {
        let s = "";
        for (let i = 1; i <= 5; i++)
          s += i <= r ? "★" : `<span class="off">★</span>`;
        return r > 0
          ? `<div class="stars">${s}</div>`
          : `<div class="stars"><span class="off">☆☆☆☆☆</span></div>`;
      }

      function renderStats() {
        const total = items.length,
          byCat = (k) => items.filter((c) => c.category === k).length;
        const readN = items.filter((c) => c.readStatus === "read").length;
        const spend = items.reduce((s, c) => s + itemTotal(c), 0);
        $("#subline").innerHTML =
          total > 0
            ? `Bạn đang có <b>${total}</b> đầu truyện · tổng giá trị <b>${money(
                spend
              )}</b>`
            : `Chưa có truyện nào — bấm “Thêm truyện” để bắt đầu nhé!`;
        $("#stats").innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">Tổng đầu truyện</div></div>
    <div class="stat"><div class="num">${byCat(
      "full"
    )}</div><div class="lbl">Truyện Full</div></div>
    <div class="stat"><div class="num">${byCat(
      "le"
    )}</div><div class="lbl">Truyện Lẻ</div></div>
    <div class="stat"><div class="num">${byCat(
      "boxset"
    )}</div><div class="lbl">Boxset</div></div>
    <div class="stat accent"><div class="num">${readN}</div><div class="lbl">Đã đọc</div></div>
    <div class="stat dark"><div class="num">${money(
      spend
    )}</div><div class="lbl">Tổng giá trị</div></div>`;
      }
      function updateChipCounts() {
        document.querySelectorAll("[data-c]").forEach((el) => {
          const k = el.dataset.c;
          let n;
          if (k === "all") n = items.length;
          else if (k === "related")
            n = items.filter((c) => grp(c) !== "").length;
          else n = items.filter((c) => c.category === k).length;
          el.textContent = "(" + n + ")";
        });
      }
      function updateFolderDatalist() {
        const set = [...new Set(items.map(grp).filter(Boolean))].sort((a, b) =>
          a.localeCompare(b, "vi")
        );
        $("#folderList").innerHTML = set
          .map((f) => `<option value="${esc(f)}">`)
          .join("");
      }

      function filtered() {
        return items.filter((c) => {
          let catOk;
          if (state.cat === "all") catOk = true;
          else if (state.cat === "related")
            catOk =
              grp(c) !== "" &&
              (state.group === "all" || grp(c) === state.group);
          else catOk = c.category === state.cat;
          const readOk = state.read === "all" || c.readStatus === state.read;
          const qOk =
            state.q === "" ||
            (c.title || "").toLowerCase().includes(state.q) ||
            (c.author || "").toLowerCase().includes(state.q);
          return catOk && readOk && qOk;
        });
      }
      function sortList(a) {
        const s = state.sort,
          l = [...a];
        if (s === "new")
          l.sort(
            (x, y) =>
              (y.dateAdded || "").localeCompare(x.dateAdded || "") ||
              y.id - x.id
          );
        else if (s === "old")
          l.sort(
            (x, y) =>
              (x.dateAdded || "").localeCompare(y.dateAdded || "") ||
              x.id - y.id
          );
        else if (s === "az")
          l.sort((x, y) => (x.title || "").localeCompare(y.title || "", "vi"));
        else if (s === "priceHigh")
          l.sort((x, y) => itemTotal(y) - itemTotal(x));
        else if (s === "priceLow")
          l.sort((x, y) => itemTotal(x) - itemTotal(y));
        return l;
      }

      function cardHTML(c) {
        return `<article class="card" onclick="openEditor(${c.id})">
    <div class="cover cover--${c.coverStyle || "red"}">
      ${coverHTML(c)}
      <div class="card-tools">
        <button class="tool-btn del" onclick="event.stopPropagation();quickDelete(${
          c.id
        })" aria-label="Xoá"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div>
    </div>
    <div class="card-body">
      <h3 class="card-title">${esc(c.title)}</h3>
      <p class="card-author">${esc(c.author || "—")}</p>
      ${starsHTML(c.rating || 0)}
      <div class="badges">
        <span class="tag cat">${CAT_BADGE[c.category] || ""}</span>
        <span class="tag ${c.readStatus || "unread"}">${
          READ_LABEL[c.readStatus] || "Chưa đọc"
        }</span>
        ${
          c.specials && c.specials.length
            ? `<span class="tag sp">+${c.specials.length} bản ĐB</span>`
            : ``
        }
        ${grp(c) ? `<span class="tag fold">${esc(grp(c))}</span>` : ``}
      </div>
      <div class="card-foot">
        <span class="price">${
          itemTotal(c) > 0 ? money(itemTotal(c)) : "—"
        }</span>
        ${
          (Number(c.qty) || 1) > 1
            ? `<span class="card-date">${Number(c.qty)} cuốn</span>`
            : ``
        }
      </div>
    </div></article>`;
      }

      function renderSubchips() {
        const wrap = $("#subchips");
        if (state.cat !== "related") {
          wrap.style.display = "none";
          wrap.innerHTML = "";
          return;
        }
        const groups = {};
        items.forEach((c) => {
          const f = grp(c);
          if (f) groups[f] = (groups[f] || 0) + 1;
        });
        const names = Object.keys(groups).sort((a, b) =>
          a.localeCompare(b, "vi")
        );
        if (names.length === 0) {
          wrap.style.display = "none";
          wrap.innerHTML = "";
          return;
        }
        if (state.group !== "all" && !names.includes(state.group))
          state.group = "all";
        const total = names.reduce((s, n) => s + groups[n], 0);
        wrap.style.display = "flex";
        wrap.innerHTML =
          `<span class="lead">Nhóm:</span>` +
          `<button class="subchip ${
            state.group === "all" ? "active" : ""
          }" data-group="all">Tất cả nhóm <span class="n">(${total})</span></button>` +
          names
            .map(
              (n) =>
                `<button class="subchip ${
                  state.group === n ? "active" : ""
                }" data-group="${esc(n)}">${esc(n)} <span class="n">(${
                  groups[n]
                })</span></button>`
            )
            .join("");
        wrap.querySelectorAll(".subchip").forEach(
          (b) =>
            (b.onclick = () => {
              state.group = b.dataset.group;
              render();
            })
        );
      }

      function render() {
        renderStats();
        updateChipCounts();
        updateFolderDatalist();
        renderSubchips();
        const box = $("#content");
        if (items.length === 0) {
          box.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M4 19.5V5a2 2 0 0 1 2-2h12v18l-6-3-6 3z"/></svg><p>Tủ truyện đang trống.<br>Thêm cuốn đầu tiên để bắt đầu bộ sưu tập!</p><button class="btn btn--red" onclick="openEditor()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Thêm truyện</button></div>`;
          return;
        }
        if (
          state.cat === "related" &&
          items.filter((c) => grp(c) !== "").length === 0
        ) {
          box.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg><p>Chưa có truyện nào được xếp vào nhóm liên quan.<br>Mở một truyện, điền ô <b>“Truyện liên quan”</b> (vd: Doraemon) để gộp các bộ liên quan lại với nhau.</p></div>`;
          return;
        }
        const list = filtered();
        if (list.length === 0) {
          box.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><p>Không có truyện nào khớp bộ lọc.</p></div>`;
          return;
        }

        if (state.cat === "related" && state.group === "all") {
          const groups = {};
          list.forEach((c) => {
            (groups[grp(c)] = groups[grp(c)] || []).push(c);
          });
          const names = Object.keys(groups).sort((a, b) =>
            a.localeCompare(b, "vi")
          );
          box.innerHTML = names
            .map(
              (n) =>
                `<div class="section-label">${esc(n)} <span class="sl-count">${
                  groups[n].length
                } bộ</span></div><div class="grid">${sortList(groups[n])
                  .map(cardHTML)
                  .join("")}</div>`
            )
            .join("");
        } else {
          box.innerHTML = `<div class="grid">${sortList(list)
            .map(cardHTML)
            .join("")}</div>`;
        }
      }

      /* ----- EDITOR ----- */
      function buildStarInput() {
        const box = $("#starInput");
        box.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
          const s = document.createElement("span");
          s.textContent = "★";
          s.dataset.v = i;
          s.onclick = () => {
            formRating = formRating === i ? 0 : i;
            paintStars();
          };
          box.appendChild(s);
        }
        paintStars();
      }
      function paintStars() {
        document
          .querySelectorAll("#starInput span")
          .forEach((s) =>
            s.classList.toggle("on", parseInt(s.dataset.v) <= formRating)
          );
      }

      function updateCoverPrev() {
        const url = $("#f_cover").value.trim(),
          style = $("#f_coverStyle").value,
          cover = formCover || url;
        const p = $("#coverPrev");
        p.className = "cover-prev cover--" + style;
        p.innerHTML = cover
          ? `<img src="${esc(cover)}" alt="">`
          : esc(shortTitle($("#f_title").value || "Bìa"));
      }

      function readSpecialsFromDOM() {
        return Array.from(
          document.querySelectorAll("#specialList .special-item")
        ).map((r, i) => ({
          name: r.querySelector(".sp-name").value.trim(),
          vol: r.querySelector(".sp-vol").value.trim(),
          price: Number(r.querySelector(".sp-price").value) || 0,
          cover: (formSpecials[i] && formSpecials[i].cover) || "",
        }));
      }
      function renderSpecials() {
        $("#specialList").innerHTML = formSpecials
          .map(
            (s, i) => `
    <div class="special-item">
      <label class="sp-thumb">${
        s.cover
          ? `<img src="${esc(s.cover)}" alt="">`
          : `<span class="sp-thumb-add">+ Ảnh</span>`
      }<input type="file" accept="image/*" style="display:none" onchange="pickSpecialImage(${i},this)"></label>
      <div class="sp-fields">
        <input class="sp-name" type="text" placeholder="Tên bản đặc biệt (vd: Bản giới hạn)" value="${esc(
          s.name
        )}" oninput="updateTotalPreview()">
        <div class="sp-row2">
          <input class="sp-vol" type="text" placeholder="Số tập" value="${esc(
            s.vol
          )}">
          <input class="sp-price" type="number" min="0" placeholder="Giá" value="${
            s.price ? esc(s.price) : ""
          }" oninput="updateTotalPreview()">
          <button type="button" class="sp-del" onclick="removeSpecial(${i})" aria-label="Xoá bản đặc biệt">×</button>
        </div>
      </div>
    </div>`
          )
          .join("");
      }
      function pickSpecialImage(i, input) {
        const file = input.files[0];
        if (!file) return;
        const fr = new FileReader();
        fr.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxW = 400,
              scale = Math.min(1, maxW / img.width),
              w = Math.round(img.width * scale),
              h = Math.round(img.height * scale);
            const cv = document.createElement("canvas");
            cv.width = w;
            cv.height = h;
            cv.getContext("2d").drawImage(img, 0, 0, w, h);
            formSpecials = readSpecialsFromDOM();
            formSpecials[i].cover = cv.toDataURL("image/jpeg", 0.8);
            renderSpecials();
            showToast("Đã thêm ảnh minh hoạ");
          };
          img.src = fr.result;
        };
        fr.readAsDataURL(file);
      }
      function addSpecial() {
        formSpecials = readSpecialsFromDOM();
        formSpecials.push({ name: "", vol: "", price: 0, cover: "" });
        renderSpecials();
        updateTotalPreview();
        const rows = document.querySelectorAll("#specialList .special-item");
        if (rows.length)
          rows[rows.length - 1].querySelector(".sp-name").focus();
      }
      function removeSpecial(i) {
        formSpecials = readSpecialsFromDOM();
        formSpecials.splice(i, 1);
        renderSpecials();
        updateTotalPreview();
      }
      function updateTotalPreview() {
        const p = Number($("#f_price").value) || 0,
          q = Math.max(1, Number($("#f_qty").value) || 1);
        const spSum = readSpecialsFromDOM().reduce(
          (s, x) => s + (Number(x.price) || 0),
          0
        );
        const base = p * q,
          total = base + spSum,
          el = $("#totalPreview");
        if (total > 0) {
          const d = [];
          if (base > 0)
            d.push(q > 1 ? `${money(p)}/cuốn × ${q}` : `${money(p)}`);
          if (spSum > 0) d.push(`bản ĐB ${money(spSum)}`);
          el.innerHTML =
            `Thành tiền cả bộ: <b>${money(total)}</b>` +
            (d.length ? ` <span class="tp-sub">(${d.join(" + ")})</span>` : "");
        } else el.innerHTML = "";
      }

      function openEditor(id) {
        editingId = id || null;
        formCover = "";
        formRating = 0;
        formSpecials = [];
        [
          "f_id",
          "f_title",
          "f_author",
          "f_publisher",
          "f_volumes",
          "f_folder",
          "f_condition",
          "f_price",
          "f_qty",
          "f_cover",
          "f_note",
        ].forEach((k) => ($("#" + k).value = ""));
        $("#f_category").value = "full";
        $("#f_read").value = "unread";
        $("#f_coverStyle").value = "red";
        $("#f_file").value = "";
        $("#f_qty").value = "1";
        if (id) {
          const c = items.find((x) => x.id === id);
          if (c) {
            formCover = c.cover || "";
            formRating = c.rating || 0;
            formSpecials = Array.isArray(c.specials)
              ? c.specials.map((s) => ({
                  name: s.name || "",
                  vol: s.vol || "",
                  price: Number(s.price) || 0,
                  cover: s.cover || "",
                }))
              : [];
            $("#f_title").value = c.title || "";
            $("#f_author").value = c.author || "";
            $("#f_publisher").value = c.publisher || "";
            $("#f_category").value = c.category || "full";
            $("#f_volumes").value = c.volumes || "";
            $("#f_folder").value = c.folder || "";
            $("#f_condition").value = c.condition || "";
            $("#f_price").value = c.price || "";
            $("#f_qty").value = c.qty || 1;
            $("#f_read").value = c.readStatus || "unread";
            $("#f_coverStyle").value = c.coverStyle || "red";
            $("#f_cover").value =
              c.cover && !c.cover.startsWith("data:") ? c.cover : "";
            $("#f_note").value = c.note || "";
          }
          $("#editorTitle").innerHTML =
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>Sửa truyện';
          $("#saveLbl").textContent = "Lưu thay đổi";
          $("#delLink").style.display = "block";
        } else {
          $("#editorTitle").innerHTML =
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Thêm truyện';
          $("#saveLbl").textContent = "Lưu truyện";
          $("#delLink").style.display = "none";
        }
        updateFolderDatalist();
        buildStarInput();
        updateCoverPrev();
        renderSpecials();
        updateTotalPreview();
        $("#overlay").classList.add("open");
        setTimeout(() => $("#f_title").focus(), 120);
      }
      function closeEditor() {
        $("#overlay").classList.remove("open");
      }

      function saveItem() {
        const title = $("#f_title").value.trim();
        if (!title) {
          showToast("Nhập tên truyện đã nhé");
          $("#f_title").focus();
          return;
        }
        const data = {
          title,
          author: $("#f_author").value.trim(),
          publisher: $("#f_publisher").value.trim(),
          category: $("#f_category").value,
          volumes: $("#f_volumes").value.trim(),
          folder: $("#f_folder").value.trim(),
          condition: $("#f_condition").value.trim(),
          price: Number($("#f_price").value) || 0,
          qty: Math.max(1, Number($("#f_qty").value) || 1),
          specials: readSpecialsFromDOM().filter(
            (s) => s.name || s.vol || s.price > 0 || s.cover
          ),
          readStatus: $("#f_read").value,
          rating: formRating,
          coverStyle: $("#f_coverStyle").value,
          cover: formCover || $("#f_cover").value.trim(),
          note: $("#f_note").value.trim(),
        };
        if (editingId) {
          const i = items.findIndex((x) => x.id === editingId);
          items[i] = { ...items[i], ...data };
          showToast("Đã lưu thay đổi");
        } else {
          const newId = items.length
            ? Math.max(...items.map((c) => c.id)) + 1
            : 1;
          items.unshift({ id: newId, dateAdded: todayStr(), ...data });
          showToast("Đã thêm vào tủ truyện");
        }
        save();
        closeEditor();
        render();
      }
      function deleteCurrent() {
        if (editingId) quickDelete(editingId, true);
      }
      function quickDelete(id, fromEditor) {
        const c = items.find((x) => x.id === id);
        if (!confirm(`Xoá "${c ? c.title : ""}" khỏi tủ truyện?`)) return;
        items = items.filter((x) => x.id !== id);
        save();
        if (fromEditor) closeEditor();
        render();
        showToast("Đã xoá truyện");
      }

      $("#f_file").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fr = new FileReader();
        fr.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxW = 640,
              scale = Math.min(1, maxW / img.width),
              w = Math.round(img.width * scale),
              h = Math.round(img.height * scale);
            const cv = document.createElement("canvas");
            cv.width = w;
            cv.height = h;
            cv.getContext("2d").drawImage(img, 0, 0, w, h);
            formCover = cv.toDataURL("image/jpeg", 0.82);
            $("#f_cover").value = "";
            updateCoverPrev();
            showToast("Đã thêm ảnh bìa");
          };
          img.src = fr.result;
        };
        fr.readAsDataURL(file);
      });

      function triggerDownload(content, filename, mime) {
        const blob = new Blob([content], { type: mime }),
          url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1500);
      }
      function exportJSON() {
        triggerDownload(
          JSON.stringify(items, null, 2),
          "tu-truyen-sao-luu.json",
          "application/json"
        );
        showToast("Đã tải file sao lưu");
      }
      $("#importFile").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fr = new FileReader();
        fr.onload = () => {
          try {
            const data = JSON.parse(fr.result);
            if (!Array.isArray(data)) throw 0;
            items = data.map((c, i) => ({
              id: c.id || i + 1,
              title: c.title || "",
              author: c.author || "",
              publisher: c.publisher || "",
              category: c.category || "le",
              volumes: c.volumes || "",
              folder: (c.folder || "").trim(),
              condition: c.condition || "",
              price: Number(c.price) || 0,
              qty: Number(c.qty) || 1,
              specials: Array.isArray(c.specials)
                ? c.specials.map((s) => ({
                    name: String(s.name || ""),
                    vol: String(s.vol || ""),
                    price: Number(s.price) || 0,
                    cover: s.cover || "",
                  }))
                : [],
              dateAdded: c.dateAdded || todayStr(),
              readStatus: c.readStatus || "unread",
              rating: Number(c.rating) || 0,
              coverStyle: c.coverStyle || "red",
              cover: c.cover || "",
              note: c.note || "",
            }));
            save();
            render();
            showToast("Đã khôi phục " + items.length + " truyện");
          } catch (err) {
            showToast("File không hợp lệ");
          }
        };
        fr.readAsText(file);
        e.target.value = "";
      });

      let tt;
      function showToast(m) {
        $("#toastText").textContent = m;
        const t = $("#toast");
        t.classList.add("show");
        clearTimeout(tt);
        tt = setTimeout(() => t.classList.remove("show"), 2200);
      }

      document.querySelectorAll(".chip").forEach(
        (ch) =>
          (ch.onclick = () => {
            state.cat = ch.dataset.cat;
            if (state.cat === "related") state.group = "all";
            document
              .querySelectorAll(".chip")
              .forEach((x) => x.classList.toggle("active", x === ch));
            render();
          })
      );
      $("#search").addEventListener("input", (e) => {
        state.q = e.target.value.trim().toLowerCase();
        render();
      });
      $("#readFilter").addEventListener("change", (e) => {
        state.read = e.target.value;
        render();
      });
      $("#sort").addEventListener("change", (e) => {
        state.sort = e.target.value;
        render();
      });
      $("#f_title").addEventListener("input", updateCoverPrev);
      $("#overlay").addEventListener("click", (e) => {
        if (e.target.id === "overlay") closeEditor();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && $("#overlay").classList.contains("open"))
          closeEditor();
      });

      (function () {
        const local = readLocal();
        items = local && local.length ? local : readSeed();
        render();
      })();
    </script>
  </body>
</html>
