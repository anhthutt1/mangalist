<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tủ Truyện Của Tôi — Quản lý bộ sưu tập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1714;
        --paper: #f7f3ec;
        --card: #ffffff;
        --red: #e5342a;
        --muted: #8a8276;
        --maxw: 1180px;
        --r: 4px;
        --shadow-hard: 5px 5px 0 var(--ink);
        --shadow-hard-lg: 8px 8px 0 var(--ink);
        --halftone: radial-gradient(
          circle,
          rgba(26, 23, 20, 0.16) 1.1px,
          transparent 1.5px
        );
        --halftone-red: radial-gradient(
          circle,
          rgba(229, 52, 42, 0.45) 1.1px,
          transparent 1.5px
        );
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Be Vietnam Pro", system-ui, -apple-system, "Segoe UI",
          Roboto, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      input,
      select,
      textarea {
        font-family: inherit;
      }
      .os {
        font-family: "Oswald", "Be Vietnam Pro", sans-serif;
      }

      /* HEADER */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 60;
        background: var(--paper);
        border-bottom: 3px solid var(--ink);
      }
      .header-inner {
        max-width: var(--maxw);
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 14px 20px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 11px;
        flex-shrink: 0;
      }
      .logo-mark {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
        background: var(--red);
        border: 2.5px solid var(--ink);
        border-radius: 50% 50% 50% 4px;
        display: grid;
        place-items: center;
        box-shadow: 3px 3px 0 var(--ink);
      }
      .logo-mark svg {
        width: 22px;
        height: 22px;
        stroke: #fff;
        stroke-width: 2;
        fill: none;
      }
      .logo-text {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        line-height: 1;
      }
      .logo-text small {
        display: block;
        font-size: 10px;
        letter-spacing: 2.5px;
        color: var(--muted);
        font-weight: 500;
      }
      .header-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .btn {
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        padding: 11px 18px;
        border: 2.5px solid var(--ink);
        border-radius: var(--r);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.15s;
        box-shadow: var(--shadow-hard);
        white-space: nowrap;
      }
      .btn:hover {
        transform: translate(-2px, -2px);
        box-shadow: var(--shadow-hard-lg);
      }
      .btn:active {
        transform: translate(0, 0);
        box-shadow: 2px 2px 0 var(--ink);
      }
      .btn--red {
        background: var(--red);
        color: #fff;
      }
      .btn--paper {
        background: var(--card);
        color: var(--ink);
      }
      .btn--ink {
        background: var(--ink);
        color: var(--paper);
      }
      .btn svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        stroke-width: 2.2;
        fill: none;
      }
      .btn.sm {
        font-size: 12.5px;
        padding: 9px 13px;
        box-shadow: 3px 3px 0 var(--ink);
      }
      .btn.sm:hover {
        box-shadow: 4px 4px 0 var(--ink);
      }
      .btn.ghost {
        box-shadow: none;
        border-width: 2px;
      }
      .btn.ghost:hover {
        transform: none;
        background: #efe9df;
        box-shadow: none;
      }

      /* DASHBOARD */
      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 30px 20px 70px;
      }
      .page-head {
        margin-bottom: 22px;
      }
      .page-head h1 {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: clamp(28px, 5vw, 44px);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        line-height: 1;
      }
      .page-head p {
        color: var(--muted);
        font-size: 15px;
        margin-top: 6px;
      }
      .page-head p b {
        color: var(--red);
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 13px;
        margin-bottom: 28px;
      }
      .stat {
        flex: 1;
        min-width: 140px;
        background: var(--card);
        border: 2.5px solid var(--ink);
        border-radius: var(--r);
        box-shadow: var(--shadow-hard);
        padding: 15px 17px;
      }
      .stat .num {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 30px;
        line-height: 1;
      }
      .stat .lbl {
        font-family: "Oswald", sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        font-weight: 500;
        margin-top: 5px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .stat.accent {
        background: var(--red);
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .stat.accent::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone-red);
        background-size: 8px 8px;
        opacity: 0.5;
      }
      .stat.accent .lbl {
        color: rgba(255, 255, 255, 0.85);
      }
      .stat.dark {
        background: var(--ink);
        color: var(--paper);
        position: relative;
        overflow: hidden;
      }
      .stat.dark::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone-red);
        background-size: 8px 8px;
        opacity: 0.45;
      }
      .stat.dark .num,
      .stat.dark .lbl {
        position: relative;
        z-index: 2;
      }
      .stat.dark .lbl {
        color: rgba(247, 243, 236, 0.7);
      }

      /* TOOLBAR */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 11px;
        margin-bottom: 24px;
        padding-bottom: 18px;
        border-bottom: 2px solid var(--ink);
      }
      .chips {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .chips::-webkit-scrollbar {
        display: none;
      }
      .chip {
        flex-shrink: 0;
        font-family: "Oswald", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 8px 15px;
        border: 2px solid var(--ink);
        border-radius: 30px;
        background: var(--card);
        transition: 0.15s;
        white-space: nowrap;
      }
      .chip:hover {
        background: #efe9df;
      }
      .chip.active {
        background: var(--ink);
        color: var(--paper);
      }
      .chip .n {
        opacity: 0.6;
        font-size: 11px;
        margin-left: 4px;
      }
      .spacer {
        flex: 1;
        min-width: 8px;
      }
      .ctl {
        display: flex;
        align-items: center;
        gap: 7px;
        border: 2px solid var(--ink);
        border-radius: 30px;
        padding: 6px 13px;
        background: var(--card);
      }
      .ctl svg {
        width: 16px;
        height: 16px;
        stroke: var(--muted);
        stroke-width: 2;
        fill: none;
        flex-shrink: 0;
      }
      .ctl input,
      .ctl select {
        border: none;
        outline: none;
        background: none;
        font-size: 13.5px;
        color: var(--ink);
      }
      .ctl input {
        width: 150px;
      }
      .ctl input::placeholder {
        color: var(--muted);
      }
      .ctl select {
        font-family: "Oswald", sans-serif;
        font-weight: 500;
        letter-spacing: 0.3px;
        cursor: pointer;
      }
      .view-toggle {
        display: flex;
        border: 2px solid var(--ink);
        border-radius: 30px;
        overflow: hidden;
      }
      .view-toggle button {
        font-family: "Oswald", sans-serif;
        font-size: 12.5px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 8px 13px;
        transition: 0.13s;
      }
      .view-toggle button.active {
        background: var(--red);
        color: #fff;
      }

      /* GRID + CARD */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(186px, 1fr));
        gap: 26px 22px;
      }
      .card {
        background: var(--card);
        border: 2.5px solid var(--ink);
        border-radius: var(--r);
        box-shadow: var(--shadow-hard);
        display: flex;
        flex-direction: column;
        transition: transform 0.18s, box-shadow 0.18s;
        overflow: hidden;
        cursor: pointer;
      }
      .card:hover {
        transform: translate(-3px, -3px);
        box-shadow: var(--shadow-hard-lg);
      }
      .cover {
        aspect-ratio: 3/4.1;
        position: relative;
        overflow: hidden;
        border-bottom: 2.5px solid var(--ink);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 14px;
      }
      .cover img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .cover--red {
        background: var(--red);
      }
      .cover--ink {
        background: var(--ink);
      }
      .cover--paper {
        background: #efe6d4;
      }
      .cover::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone);
        background-size: 8px 8px;
        opacity: 0.5;
        pointer-events: none;
      }
      .cover--paper::before {
        opacity: 0.7;
      }
      .cover-title {
        position: relative;
        z-index: 2;
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        line-height: 1.02;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        font-size: clamp(17px, 2vw, 21px);
      }
      .cover--red .cover-title,
      .cover--ink .cover-title {
        color: var(--paper);
      }
      .cover--paper .cover-title {
        color: var(--ink);
      }
      .cover-sub {
        position: relative;
        z-index: 2;
        font-size: 11px;
        margin-top: 5px;
        opacity: 0.8;
        font-weight: 500;
      }
      .cover--red .cover-sub,
      .cover--ink .cover-sub {
        color: var(--paper);
      }
      .cover--paper .cover-sub {
        color: #5a544a;
      }
      .cover-tag {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 3;
        background: var(--ink);
        color: var(--paper);
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        padding: 5px 10px;
        border-right: 2.5px solid var(--ink);
        border-bottom: 2.5px solid var(--ink);
        border-radius: 0 0 var(--r) 0;
      }
      .cover--ink .cover-tag {
        background: var(--red);
      }
      .card-tools {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 4;
        display: flex;
        gap: 6px;
        opacity: 0;
        transition: 0.15s;
      }
      .card:hover .card-tools {
        opacity: 1;
      }
      .tool-btn {
        width: 30px;
        height: 30px;
        border: 2px solid var(--ink);
        border-radius: 5px;
        background: var(--paper);
        display: grid;
        place-items: center;
      }
      .tool-btn svg {
        width: 14px;
        height: 14px;
        stroke: var(--ink);
        stroke-width: 2;
        fill: none;
      }
      .tool-btn.del:hover {
        background: var(--red);
      }
      .tool-btn.del:hover svg {
        stroke: #fff;
      }
      .card-body {
        padding: 13px 14px 15px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .card-title {
        font-weight: 700;
        font-size: 15px;
        line-height: 1.25;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-author {
        font-size: 12.5px;
        color: var(--muted);
        margin-top: 3px;
      }
      .stars {
        font-size: 13px;
        letter-spacing: 1px;
        color: var(--red);
        margin-top: 7px;
        min-height: 18px;
      }
      .stars .off {
        color: #d8d0c2;
      }
      .badges {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .tag {
        font-family: "Oswald", sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        padding: 3px 8px;
        border: 1.5px solid var(--ink);
        border-radius: 20px;
      }
      .tag.cat {
        background: var(--ink);
        color: var(--paper);
      }
      .tag.read {
        background: #1f7a3d;
        color: #fff;
        border-color: var(--ink);
      }
      .tag.reading {
        background: var(--red);
        color: #fff;
        border-color: var(--ink);
      }
      .tag.unread {
        background: transparent;
        color: var(--muted);
        border-color: #c9c2b6;
      }
      .card-foot {
        margin-top: auto;
        padding-top: 11px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .price {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 15px;
      }
      .card-date {
        font-size: 11px;
        color: var(--muted);
      }

      /* MONTH VIEW */
      .month-sec {
        margin-bottom: 36px;
      }
      .month-head {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 18px;
        border-bottom: 2px solid var(--ink);
        padding-bottom: 9px;
      }
      .month-head h3 {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 22px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .month-head .mc {
        font-size: 12.5px;
        color: var(--muted);
      }
      .month-head .mtotal {
        margin-left: auto;
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        color: var(--red);
        font-size: 15px;
      }

      .empty {
        text-align: center;
        padding: 70px 20px;
        color: var(--muted);
      }
      .empty svg {
        width: 58px;
        height: 58px;
        stroke: var(--muted);
        stroke-width: 1.5;
        fill: none;
        margin-bottom: 16px;
      }
      .empty .btn {
        margin-top: 18px;
      }

      /* FAB */
      .fab {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 55;
        width: 60px;
        height: 60px;
        background: var(--red);
        border: 3px solid var(--ink);
        border-radius: 50% 50% 50% 6px;
        box-shadow: var(--shadow-hard);
        display: grid;
        place-items: center;
        transition: transform 0.16s;
      }
      .fab:hover {
        transform: translate(-2px, -2px) rotate(-4deg);
      }
      .fab svg {
        width: 28px;
        height: 28px;
        stroke: #fff;
        stroke-width: 2.4;
        fill: none;
      }

      /* MODAL / EDITOR */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 23, 20, 0.6);
        z-index: 90;
        display: grid;
        place-items: center;
        padding: 18px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.22s;
      }
      .overlay.open {
        opacity: 1;
        visibility: visible;
      }
      .editor {
        background: var(--paper);
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: var(--shadow-hard-lg);
        width: 100%;
        max-width: 560px;
        max-height: 92vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transform: scale(0.96);
        transition: transform 0.24s cubic-bezier(0.34, 1.3, 0.64, 1);
      }
      .overlay.open .editor {
        transform: scale(1);
      }
      .editor-head {
        background: var(--ink);
        color: var(--paper);
        padding: 15px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .editor-head::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--halftone-red);
        background-size: 9px 9px;
        opacity: 0.5;
        pointer-events: none;
      }
      .editor-head h2 {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .x-btn {
        width: 32px;
        height: 32px;
        border: 2px solid var(--paper);
        border-radius: 5px;
        display: grid;
        place-items: center;
        position: relative;
        z-index: 2;
      }
      .x-btn svg {
        width: 15px;
        height: 15px;
        stroke: var(--paper);
        stroke-width: 2.5;
        fill: none;
      }
      .x-btn:hover {
        background: var(--red);
      }
      .editor-body {
        padding: 22px;
        overflow-y: auto;
      }
      .fld {
        margin-bottom: 13px;
      }
      .fld label {
        display: block;
        font-family: "Oswald", sans-serif;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .fld label .req {
        color: var(--red);
      }
      .fld input,
      .fld select,
      .fld textarea {
        width: 100%;
        border: 2px solid var(--ink);
        border-radius: 4px;
        padding: 10px 12px;
        font-size: 14px;
        background: var(--card);
        color: var(--ink);
        outline: none;
      }
      .fld input:focus,
      .fld select:focus,
      .fld textarea:focus {
        box-shadow: 2px 2px 0 var(--red);
      }
      .fld textarea {
        resize: vertical;
        min-height: 64px;
      }
      .fld-row {
        display: flex;
        gap: 11px;
      }
      .fld-row .fld {
        flex: 1;
      }
      .star-input {
        display: flex;
        gap: 4px;
      }
      .star-input span {
        font-size: 26px;
        color: #d8d0c2;
        cursor: pointer;
        line-height: 1;
        transition: 0.1s;
      }
      .star-input span.on {
        color: var(--red);
      }
      .star-input span:hover {
        transform: scale(1.15);
      }
      .cover-pick {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .cover-prev {
        width: 66px;
        height: 86px;
        border: 2px solid var(--ink);
        border-radius: 3px;
        overflow: hidden;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        font-family: "Oswald", sans-serif;
        font-size: 9px;
        text-align: center;
        padding: 4px;
        line-height: 1.1;
        position: relative;
      }
      .cover-prev img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .cover-pick .stack {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .file-btn {
        border: 2px dashed var(--ink);
        border-radius: 4px;
        padding: 9px;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        background: var(--card);
        cursor: pointer;
        transition: 0.13s;
      }
      .file-btn:hover {
        background: #efe9df;
      }
      .editor-foot {
        border-top: 3px solid var(--ink);
        padding: 14px 22px;
        background: var(--card);
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }
      .editor-foot .btn {
        flex: 1;
        justify-content: center;
      }
      .del-link {
        font-size: 13px;
        color: var(--muted);
        text-decoration: underline;
        background: none;
        padding: 6px;
      }
      .del-link:hover {
        color: var(--red);
      }

      /* TOAST */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%) translateY(80px);
        background: var(--ink);
        color: var(--paper);
        padding: 13px 22px;
        border-radius: 6px;
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        letter-spacing: 0.5px;
        font-size: 14px;
        z-index: 120;
        box-shadow: var(--shadow-hard);
        opacity: 0;
        transition: 0.3s;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 9px;
        text-transform: uppercase;
      }
      .toast svg {
        width: 18px;
        height: 18px;
        stroke: var(--red);
        stroke-width: 2.5;
        fill: none;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 600px) {
        .header-inner {
          gap: 11px;
          padding: 12px 15px;
        }
        .logo-text {
          font-size: 18px;
        }
        .header-actions .btn span.hide-sm {
          display: none;
        }
        .header-actions .btn.sm {
          padding: 9px 11px;
        }
        .wrap {
          padding: 24px 15px 80px;
        }
        .stat {
          min-width: calc(50% - 7px);
        }
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 18px 14px;
        }
        .ctl input {
          width: 110px;
        }
        .fab {
          right: 16px;
          bottom: 16px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>

    <script>
      const LS_KEY = "tutruyen_canhan_v1";
      const CAT = {
        all: "Tất cả",
        full: "Truyện Full",
        le: "Truyện Lẻ",
        boxset: "Boxset",
      };
      const CAT_BADGE = { full: "Trọn bộ", le: "Tập lẻ", boxset: "Boxset" };
      const READ_LABEL = {
        unread: "Chưa đọc",
        reading: "Đang đọc",
        read: "Đã đọc",
      };

      let items = [];
      let editingId = null;
      let formCover = "";
      let formRating = 0;
      const state = {
        cat: "all",
        read: "all",
        q: "",
        sort: "new",
        view: "grid",
      };

      const $ = (s) => document.querySelector(s);
      const money = (n) => Number(n).toLocaleString("vi-VN") + "₫";
      const esc = (s) =>
        String(s == null ? "" : s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])
        );
      const shortTitle = (t) => String(t).split("—")[0].trim();
      function todayStr() {
        const t = new Date(),
          p = (n) => String(n).padStart(2, "0");
        return `${t.getFullYear()}-${p(t.getMonth() + 1)}-${p(t.getDate())}`;
      }
      function fmtDate(s) {
        if (!s) return "—";
        const a = s.split("-");
        return `${a[2]}/${a[1]}/${a[0]}`;
      }
      function monthKey(s) {
        const a = (s || "").split("-");
        return a[0] + "-" + a[1];
      }
      function monthLabel(k) {
        const a = k.split("-");
        return `Tháng ${parseInt(a[1])}/${a[0]}`;
      }

      /* ---- lưu/đọc ---- */
      function readLocal() {
        try {
          const r = localStorage.getItem(LS_KEY);
          const a = r ? JSON.parse(r) : null;
          return Array.isArray(a) ? a : null;
        } catch (e) {
          return null;
        }
      }
      function save() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(items));
        } catch (e) {}
      }
      function readSeed() {
        try {
          return JSON.parse($("#seedData").textContent) || [];
        } catch (e) {
          return [];
        }
      }

      /* ---- bìa nhỏ ---- */
      function coverHTML(c) {
        if (c.cover) return `<img src="${esc(c.cover)}" alt="">`;
        return `<span class="cover-tag">${
          CAT_BADGE[c.category] || ""
        }</span><span class="cover-title">${esc(
          shortTitle(c.title)
        )}</span><span class="cover-sub">${esc(c.author)}</span>`;
      }
      function starsHTML(r) {
        let s = "";
        for (let i = 1; i <= 5; i++)
          s += i <= r ? "★" : `<span class="off">★</span>`;
        return r > 0
          ? `<div class="stars">${s}</div>`
          : `<div class="stars"><span class="off">☆☆☆☆☆</span></div>`;
      }

      /* ---- thống kê ---- */
      function renderStats() {
        const total = items.length;
        const byCat = (k) => items.filter((c) => c.category === k).length;
        const readN = items.filter((c) => c.readStatus === "read").length;
        const spend = items.reduce((s, c) => s + (Number(c.price) || 0), 0);
        const thisMonth = items.filter(
          (c) => monthKey(c.dateAdded) === monthKey(todayStr())
        ).length;
        $("#subline").innerHTML =
          total > 0
            ? `Bạn đang có <b>${total}</b> đầu truyện · tháng này thêm <b>${thisMonth}</b> cuốn mới`
            : `Chưa có truyện nào — bấm “Thêm truyện” để bắt đầu nhé!`;
        $("#stats").innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">Tổng đầu truyện</div></div>
    <div class="stat"><div class="num">${byCat(
      "full"
    )}</div><div class="lbl">Truyện Full</div></div>
    <div class="stat"><div class="num">${byCat(
      "le"
    )}</div><div class="lbl">Truyện Lẻ</div></div>
    <div class="stat"><div class="num">${byCat(
      "boxset"
    )}</div><div class="lbl">Boxset</div></div>
    <div class="stat accent"><div class="num">${readN}</div><div class="lbl">Đã đọc</div></div>
    <div class="stat dark"><div class="num">${money(
      spend
    )}</div><div class="lbl">Tổng đã chi</div></div>`;
      }
      function updateChipCounts() {
        document.querySelectorAll("[data-c]").forEach((el) => {
          const k = el.dataset.c;
          el.textContent =
            "(" +
            (k === "all"
              ? items.length
              : items.filter((c) => c.category === k).length) +
            ")";
        });
      }

      /* ---- lọc + sắp xếp ---- */
      function filtered() {
        return items.filter(
          (c) =>
            (state.cat === "all" || c.category === state.cat) &&
            (state.read === "all" || c.readStatus === state.read) &&
            (state.q === "" ||
              (c.title || "").toLowerCase().includes(state.q) ||
              (c.author || "").toLowerCase().includes(state.q))
        );
      }
      function sortList(a) {
        const s = state.sort,
          l = [...a];
        if (s === "new")
          l.sort(
            (x, y) =>
              (y.dateAdded || "").localeCompare(x.dateAdded || "") ||
              y.id - x.id
          );
        else if (s === "old")
          l.sort(
            (x, y) =>
              (x.dateAdded || "").localeCompare(y.dateAdded || "") ||
              x.id - y.id
          );
        else if (s === "az")
          l.sort((x, y) => (x.title || "").localeCompare(y.title || "", "vi"));
        else if (s === "priceHigh")
          l.sort((x, y) => (y.price || 0) - (x.price || 0));
        else if (s === "priceLow")
          l.sort((x, y) => (x.price || 0) - (y.price || 0));
        return l;
      }

      /* ---- thẻ ---- */
      function cardHTML(c) {
        return `<article class="card" onclick="openEditor(${c.id})">
    <div class="cover cover--${c.coverStyle || "red"}">
      ${coverHTML(c)}
      <div class="card-tools">
        <button class="tool-btn del" onclick="event.stopPropagation();quickDelete(${
          c.id
        })" aria-label="Xoá"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div>
    </div>
    <div class="card-body">
      <h3 class="card-title">${esc(c.title)}</h3>
      <p class="card-author">${esc(c.author || "—")}</p>
      ${starsHTML(c.rating || 0)}
      <div class="badges">
        <span class="tag cat">${CAT_BADGE[c.category] || ""}</span>
        <span class="tag ${c.readStatus || "unread"}">${
          READ_LABEL[c.readStatus] || "Chưa đọc"
        }</span>
      </div>
      <div class="card-foot">
        <span class="price">${Number(c.price) > 0 ? money(c.price) : "—"}</span>
        <span class="card-date">${fmtDate(c.dateAdded)}</span>
      </div>
    </div></article>`;
      }

      /* ---- render ---- */
      function render() {
        renderStats();
        updateChipCounts();
        const box = $("#content");
        const list = filtered();
        if (items.length === 0) {
          box.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M4 19.5V5a2 2 0 0 1 2-2h12v18l-6-3-6 3z"/></svg><p>Tủ truyện đang trống.<br>Thêm cuốn đầu tiên để bắt đầu bộ sưu tập!</p><button class="btn btn--red" onclick="openEditor()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Thêm truyện</button></div>`;
          return;
        }
        if (list.length === 0) {
          box.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><p>Không có truyện nào khớp bộ lọc.</p></div>`;
          return;
        }
        if (state.view === "grid") {
          box.innerHTML = `<div class="grid">${sortList(list)
            .map(cardHTML)
            .join("")}</div>`;
        } else {
          const groups = {};
          list.forEach((c) => {
            const k = monthKey(c.dateAdded) || "0000-00";
            (groups[k] = groups[k] || []).push(c);
          });
          const keys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
          box.innerHTML = keys
            .map((k) => {
              const g = groups[k].sort((x, y) => y.id - x.id);
              const spend = g.reduce((s, c) => s + (Number(c.price) || 0), 0);
              return `<section class="month-sec">
        <div class="month-head"><h3>${
          k === "0000-00" ? "Chưa rõ ngày" : monthLabel(k)
        }</h3><span class="mc">${
                g.length
              } cuốn</span><span class="mtotal">${money(spend)}</span></div>
        <div class="grid">${g.map(cardHTML).join("")}</div></section>`;
            })
            .join("");
        }
      }

      function setView(v) {
        state.view = v;
        $("#viewGrid").classList.toggle("active", v === "grid");
        $("#viewMonth").classList.toggle("active", v === "month");
        render();
      }

      /* ---- editor ---- */
      function buildStarInput() {
        const box = $("#starInput");
        box.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
          const s = document.createElement("span");
          s.textContent = "★";
          s.dataset.v = i;
          s.onclick = () => {
            formRating = formRating === i ? 0 : i;
            paintStars();
          };
          box.appendChild(s);
        }
        paintStars();
      }
      function paintStars() {
        document
          .querySelectorAll("#starInput span")
          .forEach((s) =>
            s.classList.toggle("on", parseInt(s.dataset.v) <= formRating)
          );
      }

      function updateCoverPrev() {
        const url = $("#f_cover").value.trim(),
          style = $("#f_coverStyle").value,
          cover = formCover || url;
        const p = $("#coverPrev");
        p.className = "cover-prev cover--" + style;
        p.innerHTML = cover
          ? `<img src="${esc(cover)}" alt="">`
          : esc(shortTitle($("#f_title").value || "Bìa"));
      }

      function openEditor(id) {
        editingId = id || null;
        formCover = "";
        formRating = 0;
        [
          "f_id",
          "f_title",
          "f_author",
          "f_publisher",
          "f_volumes",
          "f_condition",
          "f_price",
          "f_cover",
          "f_note",
        ].forEach((k) => ($("#" + k).value = ""));
        $("#f_category").value = "full";
        $("#f_read").value = "unread";
        $("#f_coverStyle").value = "red";
        $("#f_file").value = "";
        $("#f_date").value = todayStr();
        if (id) {
          const c = items.find((x) => x.id === id);
          if (c) {
            formCover = c.cover || "";
            formRating = c.rating || 0;
            $("#f_title").value = c.title || "";
            $("#f_author").value = c.author || "";
            $("#f_publisher").value = c.publisher || "";
            $("#f_category").value = c.category || "full";
            $("#f_volumes").value = c.volumes || "";
            $("#f_condition").value = c.condition || "";
            $("#f_price").value = c.price || "";
            $("#f_date").value = c.dateAdded || todayStr();
            $("#f_read").value = c.readStatus || "unread";
            $("#f_coverStyle").value = c.coverStyle || "red";
            $("#f_cover").value =
              c.cover && !c.cover.startsWith("data:") ? c.cover : "";
            $("#f_note").value = c.note || "";
          }
          $("#editorTitle").innerHTML =
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>Sửa truyện';
          $("#saveLbl").textContent = "Lưu thay đổi";
          $("#delLink").style.display = "block";
        } else {
          $("#editorTitle").innerHTML =
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Thêm truyện';
          $("#saveLbl").textContent = "Lưu truyện";
          $("#delLink").style.display = "none";
        }
        buildStarInput();
        updateCoverPrev();
        $("#overlay").classList.add("open");
        setTimeout(() => $("#f_title").focus(), 120);
      }
      function closeEditor() {
        $("#overlay").classList.remove("open");
      }

      function saveItem() {
        const title = $("#f_title").value.trim();
        if (!title) {
          showToast("Nhập tên truyện đã nhé");
          $("#f_title").focus();
          return;
        }
        const data = {
          title,
          author: $("#f_author").value.trim(),
          publisher: $("#f_publisher").value.trim(),
          category: $("#f_category").value,
          volumes: $("#f_volumes").value.trim(),
          condition: $("#f_condition").value.trim(),
          price: Number($("#f_price").value) || 0,
          dateAdded: $("#f_date").value || todayStr(),
          readStatus: $("#f_read").value,
          rating: formRating,
          coverStyle: $("#f_coverStyle").value,
          cover: formCover || $("#f_cover").value.trim(),
          note: $("#f_note").value.trim(),
        };
        if (editingId) {
          const i = items.findIndex((x) => x.id === editingId);
          items[i] = { ...items[i], ...data };
          showToast("Đã lưu thay đổi");
        } else {
          const newId = items.length
            ? Math.max(...items.map((c) => c.id)) + 1
            : 1;
          items.unshift({ id: newId, ...data });
          showToast("Đã thêm vào tủ truyện");
        }
        save();
        closeEditor();
        render();
      }
      function deleteCurrent() {
        if (editingId) quickDelete(editingId, true);
      }
      function quickDelete(id, fromEditor) {
        const c = items.find((x) => x.id === id);
        if (!confirm(`Xoá "${c ? c.title : ""}" khỏi tủ truyện?`)) return;
        items = items.filter((x) => x.id !== id);
        save();
        if (fromEditor) closeEditor();
        render();
        showToast("Đã xoá truyện");
      }

      /* ---- ảnh: tải + thu nhỏ ---- */
      $("#f_file").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fr = new FileReader();
        fr.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxW = 640,
              scale = Math.min(1, maxW / img.width),
              w = Math.round(img.width * scale),
              h = Math.round(img.height * scale);
            const cv = document.createElement("canvas");
            cv.width = w;
            cv.height = h;
            cv.getContext("2d").drawImage(img, 0, 0, w, h);
            formCover = cv.toDataURL("image/jpeg", 0.82);
            $("#f_cover").value = "";
            updateCoverPrev();
            showToast("Đã thêm ảnh bìa");
          };
          img.src = fr.result;
        };
        fr.readAsDataURL(file);
      });

      /* ---- sao lưu / khôi phục ---- */
      function triggerDownload(content, filename, mime) {
        const blob = new Blob([content], { type: mime }),
          url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1500);
      }
      function exportJSON() {
        triggerDownload(
          JSON.stringify(items, null, 2),
          "tu-truyen-sao-luu.json",
          "application/json"
        );
        showToast("Đã tải file sao lưu");
      }
      $("#importFile").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fr = new FileReader();
        fr.onload = () => {
          try {
            const data = JSON.parse(fr.result);
            if (!Array.isArray(data)) throw 0;
            items = data.map((c, i) => ({
              id: c.id || i + 1,
              title: c.title || "",
              author: c.author || "",
              publisher: c.publisher || "",
              category: c.category || "le",
              volumes: c.volumes || "",
              condition: c.condition || "",
              price: Number(c.price) || 0,
              dateAdded: c.dateAdded || todayStr(),
              readStatus: c.readStatus || "unread",
              rating: Number(c.rating) || 0,
              coverStyle: c.coverStyle || "red",
              cover: c.cover || "",
              note: c.note || "",
            }));
            save();
            render();
            showToast("Đã khôi phục " + items.length + " truyện");
          } catch (err) {
            showToast("File không hợp lệ");
          }
        };
        fr.readAsText(file);
        e.target.value = "";
      });

      /* ---- toast ---- */
      let tt;
      function showToast(m) {
        $("#toastText").textContent = m;
        const t = $("#toast");
        t.classList.add("show");
        clearTimeout(tt);
        tt = setTimeout(() => t.classList.remove("show"), 2200);
      }

      /* ---- events ---- */
      document.querySelectorAll(".chip").forEach(
        (ch) =>
          (ch.onclick = () => {
            state.cat = ch.dataset.cat;
            document
              .querySelectorAll(".chip")
              .forEach((x) => x.classList.toggle("active", x === ch));
            render();
          })
      );
      $("#search").addEventListener("input", (e) => {
        state.q = e.target.value.trim().toLowerCase();
        render();
      });
      $("#readFilter").addEventListener("change", (e) => {
        state.read = e.target.value;
        render();
      });
      $("#sort").addEventListener("change", (e) => {
        state.sort = e.target.value;
        render();
      });
      $("#f_title").addEventListener("input", updateCoverPrev);
      $("#overlay").addEventListener("click", (e) => {
        if (e.target.id === "overlay") closeEditor();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeEditor();
      });

      /* ---- init ---- */
      (function () {
        const local = readLocal();
        items = local && local.length ? local : readSeed();
        render();
      })();
    </script>
  </body>
</html>
